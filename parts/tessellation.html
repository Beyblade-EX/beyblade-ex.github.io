<!DOCTYPE html>
<script src="/include/common.js"></script>
<style>
    section {
        --size:15em;--gap:1em;
        padding:calc(var(--size)/2) 0;
        display:flex; flex-wrap:wrap; justify-content:center;
        gap:var(--gap);
    }
    a {
        min-width:var(--size);height:var(--size);
        background:white;text-align:center;line-height:calc(var(--size)/2);
        clip-path:polygon(50% 0%,0% 50%,50% 100%,100% 50%);
        margin:-4em 0;
    }
    a.left {margin-left:calc(var(--size)/2 + var(--gap)/2);}
    a.right {margin-right:calc(var(--size)/2 + var(--gap)/2);}
</style>

<script>
    onresize = () => {
        //nw+(n-1)g=W, n=(W+g)/(w+g)
        //nw+(n-1)g=W-(w+g/2), n=(2W-w+g)/2(w+g)
        let W = Q('section').getBoundingClientRect().width, 
            g = parseFloat(getComputedStyle(Q('section')).gap),
            w = Q('section a:first-child').getBoundingClientRect().width;
        let n1 = Math.floor((W + g) / (w + g)),
            n2 = Math.floor((2*W - w + g) / 2 / (w + g));
        n1 != n2 ? 
            margin(i => (2*n1-1)*i - (n1-2), i => (2*n1-1)*i) : 
            margin(i => (2*n1*i) - (n1-1), i => 2*n1*i - n1)
    };

    const margin = (mth, nth) => {
        Q('.left,.right', li => li.classList = '');
        let i = j = 1, el;
        while (el = Q(`a:nth-child(${mth(i++)}`)) el.classList.add('left');
        while (el = Q(`a:nth-child(${nth(j++)}`)) el.classList.add('right');
    }
    onresize();
</script>
