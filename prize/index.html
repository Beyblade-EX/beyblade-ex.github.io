<script>
    const systems = [...Array(0).keys()].reverse().map(i => i + 1);
    Q('main').prepend(new Carousel(systems.map(i => `Prize${i}.webp`), systems.map(i => `/img/system-layer${i}.png`)));

    Q('li[data-url]', li => li.onclick = () => {
        const url = li.getAttribute('data-url');
        Q('label[for=popup]').replaceChildren(...(/\${i}/.test(url) ? [1,2,3,4] : /\${a}/.test(url) ? ['a','b','c'] : [1]).map(t => image(url.replace(/\${[ai]}/, t))));
        Q('#popup').checked = true;
    });
    const image = url => E('img', {src: /^(http|\/)/.test(url) ? url : 'https://beyblade.takaratomy.co.jp/burst/public_html/' + url});

    location.hash && Q(location.hash)?.setAttribute('open', true);
</script>
