<!DOCTYPE html>
<script src=/include/common.js></script>
<title>我的陀螺盒⬧My Decks</title>
<link href="deck.css" rel="stylesheet">
<script src="deck.js"></script>
<script src="/parts/parts.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<nav>
    <script>nav(['/', '/parts/'])</script>
    <div>
        <button id="random-deck">隨機組合</button>
        <button id="export-image">製作圖片</button>
    </div>
    <div>
        <button id="delete-deck">刪除組合</button>
        <button id="export-text">複製文字</button>
    </div>
</nav>
<h1>陀螺盒</h1>
<main>
    <article>
        <div>
            <h2 title="1">DECK</h2>
        </div>
        <bey-x>1</bey-x>
        <bey-x>2</bey-x>
        <bey-x>3</bey-x>
        <span></span>
    </article>
</main>
<aside>
    <ul class="blade selecting"></ul>
    <ul class="ratchet"></ul>
    <ul class="bit"></ul>
    <div>尋找<label class="toggle vertical"><input type=checkbox></label>改造</div>
</aside>

<script>
for (let i = 2; i <= 5; i++) {
    let deck = Q('article:first-of-type').cloneNode(true);
    deck.Q('h2').title = i;
    Q('main').append(deck);
}
['blade', 'ratchet', 'bit'].forEach(c => Fetch(`/db/part-${c}.json`).then(resp => resp.json()).then(p => {
    Parts[c] = p;
    Q(`aside .${c}`).append(...Object.entries(p)
        .sort(([_1, p], [_2, q]) => Sorter.sort.weight(p, q))
        .map(([abbr]) => E('li', [new Bey({[c]: abbr}, {collapse: true, pool: true})]) 
    ));
    new Dragging('aside bey-x', {
        precondition: () => Q('aside input').checked,
        drop: Q('main bey-x'),
        lift (self, dragged) {
            Q('.targeted')?.setAttribute(...dragged.abbr[0]);
            dragged.style.transform = null;
            setTimeout(Swapping.revert, 500);
            document.body.classList.add('animating');
        }
    });
}));
const Swapping = {
    commit (dragged, target) {
        this.revert();
        let place = target.nextSibling; 
        dragged.before(target);
        place.before(dragged);
    },
    revert (keep) {
        Q('.targeted')?.classList.remove('targeted');
        keep || Bey.selected?.classList.remove('selected');
        document.body.classList.remove('animating');
        Q('bey-x[style]', bey => bey.removeAttribute('style'));
    }
}
customElements.define('bey-x', Bey);

const Export = {
    image (n) {
        if (!Q('main.actioning')) return;
        document.body.style.setProperty('--canvas', '0');
        html2canvas(Q(`article:nth-of-type(${n})`)).then(canvas => {
            E('a', {
                href: canvas.toDataURL("image/png"),
                download: `陀螺組${n}.png`
            }).click(); 
            document.body.removeAttribute('style');
        });
        Q('.actioning').classList.remove('actioning')
    },
    text (n) {

    },
    events () {
        Q('#export-image').onclick = () => {
            Q('main').classList.add('actioning');
            Q('h2', h2 => h2.onclick ??= () => Export.image(h2.title));
        };
    }
}
new Dragging('main bey-x', {
    drop: Q('main bey-x'),
    precondition: ev => Bey.selected == ev.target,
    lift (self, dragged) {
        let target = Q('.targeted');
        if (target) {
            let {x, y} = Dragging.getBoundingPageRect(target);
            dragged.style.transform = `translate(${x - dragged.origin.x}px,${y - dragged.origin.y}px)`;
            target.style.transform = `translate(${dragged.origin.x - x}px,${dragged.origin.y - y}px)`;
            setTimeout(() => Swapping.commit(dragged, target), 500);
        } else {
            if (!dragged.style.transform) return Swapping.revert(true);
            dragged.style.transform = null;
            setTimeout(Swapping.revert, 500);
        }
        document.body.classList.add('animating');
    }
});
Q('aside input').onchange = ev => {
    let selecting = Q('aside .selecting');
    ev.target.checked && selecting.style.setProperty('--scrolled', selecting.scrollLeft);
    Q('aside').classList.toggle('customizing', ev.target.checked);
}
new Dragging('aside ul', {
    precondition: () => !Q('aside input').checked,
    move (self, dragged) {
        let [dx, dy] = [self.moveX - self.pressX, self.moveY - self.pressY];
        let slided = parseInt(getComputedStyle(dragged.parentElement).getPropertyValue('--slided') || 0);
        if (!self.triggered && Math.abs(dy) > 50 && Math.atan(Math.abs(dy)/Math.abs(dx)) > Math.PI/3  
            && (slided === 0 && dy < 0 || slided === 1 || slided === 2 && dy > 0)) {
            self.triggered = true; 
            slided -= Math.sign(dy);
            dragged.parentElement.style.setProperty('--slided', slided);
            Q('aside .selecting')?.classList.remove('selecting');
            Q(`aside ul:nth-child(${slided+1})`).classList.add('selecting');
        }
    },
    lift: (self) => self.triggered = false
});
Export.events();
</script>
