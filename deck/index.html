<!DOCTYPE html>
<script src=/include/common.js></script>
<title>我的陀螺盒⬧My Decks</title>
<link href="./deck.css" rel="stylesheet">
<script src="./deck.js"></script>
<script src="/parts/parts.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<nav>
    <script>nav(['/', '/parts/'])</script>
    <div>
        <button id="random-deck">&#xe02f;隨機組合</button>
        <button id="export-image">&#xe03a; 製作圖片</button>
    </div>
    <div>
        <button id="delete-deck">&#xe008; 刪除組合</button>
        <button id="export-text">&#xe039; 複製文字</button>
    </div>
    <spin-knob id="lang" min="90" callback="Bey.lang(this.value)">
        <select><option value="tw">台<option value="hk">港<option value="jap">日<option value="eng">英</select>
        <i slot="knob">&#xe00d;<br>&#xe00e;</i>
    </spin-knob>
</nav>
<h1>陀螺盒</h1>
<main>
    <article>
        <h2 title="1">DECK</h2>
        <bey-x></bey-x>
        <bey-x></bey-x>
        <bey-x></bey-x>
        <span></span>
    </article>
</main>
<aside class="first">
    <ul class="blade selecting"></ul>
    <ul class="ratchet"></ul>
    <ul class="bit"></ul>
</aside>

<script>
for (let i = 2; i <= 5; i++) {
    let deck = Q('article:first-of-type').cloneNode(true);
    deck.Q('h2').title = i;
    Q('main').append(deck);
}
Q('aside').addEventListener('pointerdown', () => Q('aside').classList.remove('first'), {once: true});
(() => {
    let groups = ['round', 'flat', 'sharp', 'multi'];
    let sorter = {
        blade: ([_1, p], [_2, q]) => Sorter.sort.weight(p, q),
        ratchet: ([p], [q]) => parseInt(p.split('-')[1]) - parseInt(q.split('-')[1]),
        bit: ([a, p], [b, q]) => groups.indexOf(p.group ?? Parts.bit[a.at(-1)].group) - groups.indexOf(q.group ?? Parts.bit[b.at(-1)].group)
    };
    ['blade', 'ratchet', 'bit'].forEach(c => Fetch(`/db/part-${c}.json`).then(resp => resp.json()).then(p => {
        Parts[c] = p;
        Q(`aside .${c}`).append(...Object.entries(p)
            .sort(sorter[c]).map(([abbr]) => E('li', [new Bey({[c]: abbr}, {collapse: true})]) 
        ));
    }));
})();

const Swapping = {
    swap (dragged, targeted) {
        let {x, y} = Dragging.getBoundingPageRect(targeted);
        dragged.style.transform = `translate(${x - dragged.origin.x}px,${y - dragged.origin.y}px)`;
        targeted.style.transform = `translate(${dragged.origin.x - x}px,${dragged.origin.y - y}px)`;
        setTimeout(() => Swapping.commit(dragged, targeted), 500);
    },
    commit (dragged, targeted) {
        let place = targeted.nextSibling; 
        dragged.before(targeted);
        place.before(dragged);
        dragged.style.transform = targeted.style.transform = null;
    }
}
new Dragging(Q('main'), {
    drop: {
        targets: 'main bey-x',
        when: ev => ev.target.classList.contains('selected')
    },
    lift: {
        drop: (self, dragged, targeted) => targeted ? Swapping.swap(dragged, targeted) : (dragged.style.transform = null)
    }
});
new Dragging(Q('aside'), {
    scroll: {
        what: 'ul',
        when: ev => !ev.target.matches('.selected'),
    },
    drop: {
        targets: 'main bey-x',
        when: ev => ev.target.matches('.selected')
    },
    press: {
        drop (self, dragged) {
            let list = Q('aside .selecting');
            list.style.setProperty('--scrolled', list.scrollLeft);
            Q('aside').classList.add('customizing');
        }
    },
    move: {
        scroll (self, dragged) {
            let [dx, dy] = [self.moveX - self.pressX, self.moveY - self.pressY], aside = Q('aside');
            let slided = parseInt(getComputedStyle(aside).getPropertyValue('--slided') || 0);
            if (!self.triggered && Math.abs(dy) > 50 && Math.atan(Math.abs(dy)/Math.abs(dx)) > Math.PI/3  
                && (slided === 0 && dy < 0 || slided === 1 || slided === 2 && dy > 0)) {
                self.triggered = true; 
                slided -= Math.sign(dy);
                aside.style.setProperty('--slided', slided);
                Dragging.class.temp(aside, 'sliding');
                Dragging.class.switch(`aside ul:nth-child(${slided+1})`, 'selecting');
            }
        },
    },
    lift: {
        scroll: (self) => self.triggered = false,
        drop (self, dragged, targeted) {
            targeted?.setAttribute(...dragged.abbr[0]);
            dragged.style.transform = null;
            setTimeout(() => Q('.customizing')?.classList.remove('customizing'), 500);
        }
    }
});
const Export = {
    image (n) {
        if (!Q('main.actioning')) return;
        document.body.style.setProperty('--canvas', '0');
        html2canvas(Q(`article:nth-of-type(${n})`)).then(canvas => {
            E('a', {
                href: canvas.toDataURL("image/png"),
                download: `陀螺組${n}.png`
            }).click(); 
            document.body.removeAttribute('style');
        });
        Q('.actioning').classList.remove('actioning')
    },
    text (n) {

    },
    events () {
        Q('#export-image').onclick = () => {
            Q('main').classList.add('actioning');
            Q('h2', h2 => h2.onclick ??= () => Export.image(h2.title));
        };
    }
}
Export.events();
</script>
